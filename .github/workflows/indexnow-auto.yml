name: IndexNow Auto Submission
run-name: "Auto IndexNow after deploy"

on:
  push:
    branches:
      - main
    paths:
      - 'src/lib/posts.ts'
      - 'src/app/**'
      - 'src/components/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  indexnow-submit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --only=production

      - name: Wait for Vercel deployment
        run: |
          echo "⏳ Waiting 3 minutes for Vercel deployment to complete..."
          sleep 180

      - name: Run incremental IndexNow submission
        env:
          SITE_URL: https://ciberpme.vercel.app
        run: |
          echo "🚀 Running incremental IndexNow submission..."
          npm run indexnow:auto

          # Check if submission was successful
          if [ $? -eq 0 ]; then
            echo "✅ IndexNow submission completed successfully"

            # Log success for monitoring
            echo "📊 IndexNow automation summary:"
            echo "  • Trigger: Push to main branch"
            echo "  • Timestamp: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "  • Repository: ${{ github.repository }}"
            echo "  • Commit: ${{ github.sha }}"

            # Create a simple report file for debugging
            cat > indexnow-report.txt << EOF
IndexNow Auto-Submission Report
===============================
Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
Repository: ${{ github.repository }}
Branch: ${{ github.ref_name }}
Commit: ${{ github.sha }}
Trigger: ${{ github.event_name }}
Status: SUCCESS

Changed Files in this push:
EOF

            # List changed files if available
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "${{ github.event.head_commit.modified }}" | tr ' ' '\n' | grep -E '\.(ts|tsx|js|jsx|md)$' >> indexnow-report.txt || echo "No relevant files detected" >> indexnow-report.txt
            fi

            echo "📝 Report generated: indexnow-report.txt"

          else
            echo "❌ IndexNow submission failed with exit code $?"
            exit 1
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexnow-report-${{ github.run_id }}
          path: indexnow-report.txt
          retention-days: 7